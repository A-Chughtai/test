name: Test and Auto-Merge

on:
  pull_request:
    branches:
      - main

# Permissions needed to comment on and merge Pull Requests
permissions:
  contents: write
  pull-requests: write

jobs:
  test-and-merge:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the code
    - name: Checkout code
      uses: actions/checkout@v4

    # Step 2: Set up Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # Step 3: Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest

    # Step 4: Run the test suite
    # If this fails, the workflow stops here, and the PR will block the merge.
    - name: Run tests with pytest
      run: |
        pytest test_app.py

    # Step 5: Merge the branch into main if tests pass
    # This uses the built-in GitHub CLI (gh) which is pre-installed on GitHub runners.
    - name: Auto-merge Pull Request
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Tests passed! Merging pull request..."
        gh pr merge ${{ github.event.pull_request.number }} --merge --delete-branch