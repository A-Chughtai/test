name: CI Test and Push

on:
  push:
    branches:
      - main
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch: 

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository code
    - name: Checkout code
      uses: actions/checkout@v4

    # Step 2: Set up Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # Step 3: Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest

    # Step 4: Run the test suite
    # If this step fails, the workflow stops immediately, preventing the next step.
    - name: Run tests with pytest
      run: |
        pytest test_app.py

    # Step 5: Example deploy/push step
    # This only runs if the tests step above passes successfully.
    - name: Simulate Production Push
      run: |
        echo "All tests passed! Proceeding with code deployment/push logic..."